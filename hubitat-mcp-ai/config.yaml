name: "Hubitat MCP AI"
version: "0.10.22"
slug: hubitat_mcp_ai
description: "HomeBrain AI-first Hubitat assistant with unified MCP tool calling, guarded writes and verified fallback"
url: "https://github.com/ienam-smarthome/HomeBrainOS"
stage: stable
arch:
  - amd64
  - aarch64
  - armv7
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8788
panel_icon: mdi:home-assistant
panel_title: "Hubitat MCP AI"
ports:
  8788/tcp: 8788
ports_description:
  8788/tcp: "Hubitat MCP AI web interface"
webui: "http://[HOST]:[PORT:8788]"
options:
  hubitat_mcp_url: ""
  hubitat_mcp_token: ""
  ollama_enabled: true
  ollama_base_url: "http://homeassistant.local:11434"
  ollama_model: "gemma4:31b-cloud"
  ollama_planner_model: "qwen3.5:4b"
  ollama_routine_model: "gemma4:31b-cloud"
  ollama_cloud_enabled: true
  ollama_prefer_cloud_response: true
  ollama_cloud_model: "gemma4:31b-cloud"
  ollama_local_fallback_model: "qwen3.5:4b"
  ollama_cloud_fallback_local: true
  ollama_cloud_timeout_seconds: 12
  ollama_direct_cloud_enabled: true
  ollama_direct_cloud_base_url: "https://ollama.com"
  ollama_direct_cloud_api_key: ""
  ollama_direct_cloud_model: ""
  ollama_direct_cloud_fallback_local_proxy: true
  ollama_health_timeout_seconds: 3
  ollama_planner_timeout_seconds: 25
  ollama_response_timeout_seconds: 35
  ollama_routine_response_timeout_seconds: 25
  ollama_agent_timeout_seconds: 60
  ollama_quick_insight_timeout_seconds: 20
  ollama_num_ctx: 8192
  ollama_num_predict: 240
  ollama_keep_alive: "30m"
  ollama_planner_tool_limit: 40
  unified_mcp_agent_enabled: true
  unified_mcp_tool_limit: 48
  ollama_tool_result_limit_chars: 8000
  ollama_evidence_item_limit: 8
  ollama_max_tool_rounds: 6
  fast_path_enabled: true
  fallback_enabled: true
  hybrid_assistant_mode_enabled: true
  control_focus_mode_enabled: false
  control_focus_allow_verified_reads: true
  control_agent_enabled: true
  control_agent_ai_rescue_enabled: true
  control_agent_cloud_fallback_enabled: true
  control_agent_goal_prefer_cloud: true
  control_agent_intent_timeout_seconds: 5
  control_agent_cloud_timeout_seconds: 12
  control_agent_auto_execute_confidence_percent: 88
  control_agent_block_below_confidence_percent: 50
  control_agent_group_confirmation_size: 6
  control_level_verification_timeout_seconds: 3
  semantic_intent_enabled: true
  semantic_intent_timeout_seconds: 5
  semantic_intent_cloud_fallback_enabled: true
  semantic_intent_cloud_timeout_seconds: 12
  semantic_intent_cache_seconds: 300
