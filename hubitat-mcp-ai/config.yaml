name: Hubitat MCP AI
# Previous version: '0.4.16-alpha'
version: '0.4.17-alpha'
slug: hubitat_mcp_ai
description: Hybrid Ollama assistant with upgrade-safe Cloud response selection and guarded Hubitat rule workflows
url: https://github.com/ienam-smarthome/HomeBrainOS
arch:
  - amd64
  - aarch64
  - armv7
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8788
panel_icon: mdi:home-assistant
panel_title: Hubitat MCP AI
ports:
  8788/tcp: 8788
ports_description:
  8788/tcp: Hubitat MCP AI web interface
webui: http://[HOST]:[PORT:8788]
options:
  hubitat_mcp_url: ""
  hubitat_mcp_token: ""
  ollama_enabled: true
  ollama_base_url: "http://homeassistant.local:11434"
  ollama_model: "gemma4:31b-cloud"
  ollama_planner_model: "qwen3.5:4b"
  ollama_routine_model: "gemma4:31b-cloud"
  ollama_cloud_enabled: true
  ollama_prefer_cloud_response: true
  ollama_cloud_model: "gemma4:31b-cloud"
  ollama_local_fallback_model: "qwen3.5:4b"
  ollama_cloud_fallback_local: true
  ollama_cloud_timeout_seconds: 12
  ollama_health_timeout_seconds: 3
  ollama_planner_timeout_seconds: 20
  ollama_response_timeout_seconds: 30
  ollama_routine_response_timeout_seconds: 20
  ollama_agent_timeout_seconds: 50
  ollama_quick_insight_timeout_seconds: 20
  ollama_num_ctx: 2048
  ollama_num_predict: 160
  ollama_keep_alive: "30m"
  ollama_planner_tool_limit: 4
  ollama_tool_result_limit_chars: 4000
  ollama_evidence_item_limit: 8
  ollama_max_tool_rounds: 2
  fast_path_enabled: true
  fallback_enabled: true
  mcp_timeout_seconds: 25
  mcp_device_cache_seconds: 12
  mcp_catalog_cache_seconds: 60
  mcp_hub_cache_seconds: 20
  device_index_ttl_seconds: 15
  device_index_capability_ttl_seconds: 60
  device_index_metadata_ttl_seconds: 120
  home_snapshot_ai_enabled: true
  home_snapshot_ai_timeout_seconds: 20
  home_snapshot_max_items_per_group: 8
  conversation_context_ttl_seconds: 600
  conversation_context_max_sessions: 128
  conversation_context_max_group_control: 8
  control_confirmation_ttl_seconds: 120
  control_verification_timeout_seconds: 7
  rule_write_enabled: true
  rule_create_paused_required: true
  rule_workflow_ttl_seconds: 600
  request_trace_limit: 20
  attention_stale_hours: 48
  hub_cpu_probe_enabled: true
  hub_cpu_probe_timeout_seconds: 3
  dashboard_refresh_seconds: 30
  require_sensitive_confirmation: true
  web_title: "Hubitat MCP AI"
schema:
  hubitat_mcp_url: str
  hubitat_mcp_token: password
  ollama_enabled: bool
