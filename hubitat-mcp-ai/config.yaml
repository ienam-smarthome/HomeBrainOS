name: Hubitat MCP AI
version: '0.3.5-alpha'
slug: hubitat_mcp_ai
description: Ollama-first natural Hubitat assistant powered by kingpanther13's MCP Rule Server
url: https://github.com/ienam-smarthome/HomeBrainOS
arch:
  - amd64
  - aarch64
  - armv7
startup: services
boot: auto
init: false
ports:
  8788/tcp: 8788
ports_description:
  8788/tcp: Hubitat MCP AI web interface
webui: http://[HOST]:[PORT:8788]
options:
  hubitat_mcp_url: ""
  hubitat_mcp_token: ""
  ollama_enabled: true
  ollama_base_url: "http://homeassistant.local:11434"
  ollama_model: "qwen3.5:9b"
  ollama_planner_model: ""
  ollama_routine_model: ""
  ollama_health_timeout_seconds: 3
  ollama_planner_timeout_seconds: 35
  ollama_response_timeout_seconds: 75
  ollama_routine_response_timeout_seconds: 40
  ollama_agent_timeout_seconds: 120
  ollama_num_ctx: 4096
  ollama_num_predict: 180
  ollama_keep_alive: "30m"
  ollama_planner_tool_limit: 4
  ollama_tool_result_limit_chars: 6000
  ollama_evidence_item_limit: 8
  ollama_max_tool_rounds: 3
  fast_path_enabled: true
  fallback_enabled: true
  mcp_timeout_seconds: 25
  mcp_device_cache_seconds: 12
  mcp_catalog_cache_seconds: 60
  mcp_hub_cache_seconds: 20
  request_trace_limit: 20
  attention_stale_hours: 48
  hub_cpu_probe_enabled: true
  hub_cpu_probe_timeout_seconds: 3
  dashboard_refresh_seconds: 30
  require_sensitive_confirmation: true
  web_title: "Hubitat MCP AI"
schema:
  hubitat_mcp_url: str
  hubitat_mcp_token: password
  ollama_enabled: bool
  ollama_base_url: str
  ollama_model: str
  ollama_planner_model: str
  ollama_routine_model: str
  ollama_health_timeout_seconds: int
  ollama_planner_timeout_seconds: int
  ollama_response_timeout_seconds: int
  ollama_routine_response_timeout_seconds: int
  ollama_agent_timeout_seconds: int
  ollama_num_ctx: int
  ollama_num_predict: int
  ollama_keep_alive: str
  ollama_planner_tool_limit: int
  ollama_tool_result_limit_chars: int
  ollama_evidence_item_limit: int
  ollama_max_tool_rounds: int
  fast_path_enabled: bool
  fallback_enabled: bool
  mcp_timeout_seconds: int
  mcp_device_cache_seconds: int
  mcp_catalog_cache_seconds: int
  mcp_hub_cache_seconds: int
  request_trace_limit: int
  attention_stale_hours: int
  hub_cpu_probe_enabled: bool
  hub_cpu_probe_timeout_seconds: int
  dashboard_refresh_seconds: int
  require_sensitive_confirmation: bool
  web_title: str
