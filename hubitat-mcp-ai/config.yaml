name: Hubitat MCP AI
version: '0.1.9-alpha'
slug: hubitat_mcp_ai
description: Local Ollama web assistant powered by kingpanther13's Hubitat MCP Rule Server
url: https://github.com/ienam-smarthome/HomeBrainOS
arch:
  - amd64
  - aarch64
  - armv7
startup: services
boot: auto
init: false
ports:
  8788/tcp: 8788
ports_description:
  8788/tcp: Hubitat MCP AI web interface
webui: http://[HOST]:[PORT:8788]
options:
  hubitat_mcp_url: ""
  hubitat_mcp_token: ""
  ollama_enabled: true
  ollama_base_url: "http://homeassistant.local:11434"
  ollama_model: "qwen2.5:3b"
  ollama_timeout_seconds: 35
  ollama_total_timeout_seconds: 40
  ollama_health_timeout_seconds: 3
  ollama_inference_probe_timeout_seconds: 20
  ollama_inference_failure_ttl_seconds: 60
  ollama_num_ctx: 4096
  ollama_num_predict: 160
  ollama_keep_alive: "15m"
  ollama_tool_limit: 10
  ollama_max_tool_rounds: 3
  fast_path_enabled: true
  fallback_enabled: true
  mcp_timeout_seconds: 25
  attention_stale_hours: 48
  require_sensitive_confirmation: true
  web_title: "Hubitat MCP AI"
schema:
  hubitat_mcp_url: str
  hubitat_mcp_token: password
  ollama_enabled: bool
  ollama_base_url: str
  ollama_model: str
  ollama_timeout_seconds: int
  ollama_total_timeout_seconds: int
  ollama_health_timeout_seconds: int
  ollama_inference_probe_timeout_seconds: int
  ollama_inference_failure_ttl_seconds: int
  ollama_num_ctx: int
  ollama_num_predict: int
  ollama_keep_alive: str
  ollama_tool_limit: int
  ollama_max_tool_rounds: int
  fast_path_enabled: bool
  fallback_enabled: bool
  mcp_timeout_seconds: int
  attention_stale_hours: int
  require_sensitive_confirmation: bool
  web_title: str
