name: Build Android wrapper APK

on:
  workflow_dispatch:
  push:
    paths:
      - "android-wrapper/**"
      - ".github/workflows/android-wrapper-apk.yml"
  pull_request:
    paths:
      - "android-wrapper/**"
      - ".github/workflows/android-wrapper-apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK
        run: yes | sdkmanager --licenses >/dev/null && sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Build debug APK
        working-directory: android-wrapper
        run: gradle --no-daemon assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hubitat-mcp-ai-wrapper-debug
          path: android-wrapper/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
