name: Apply entity policy 0.10.35
on:
  pull_request:
    branches:
      - main
permissions:
  contents: write
jobs:
  apply:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'agent/entity-policy-0.10.35'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/entity-policy-0.10.35
          show-progress: false
      - run: python3 .github/scripts/apply_entity_policy_0_10_35.py
      - run: rm -f .github/scripts/apply_entity_policy_0_10_35.py
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Centralise targeted device request policy"
          git push
