name: Apply route registry 0.10.51

on:
  pull_request:
    branches: [main]
    paths:
      - .github/route-registry-0.10.51-trigger

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'milestone/route-registry-0.10.51'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply release wiring and metadata
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path('.')
          entry = root / 'hubitat-mcp-ai/rootfs/app/entrypoint.py'
          text = entry.read_text(encoding='utf-8')
          text = text.replace(
              'from request_tracing import install_request_tracing\n',
              'from request_tracing import install_request_tracing\nfrom route_catalogue import build_route_registry\n',
              1,
          )
          text = text.replace(
              'PREVIOUS_RELEASE_VERSION = "0.10.49"\nRELEASE_VERSION = "0.10.50"',
              'PREVIOUS_RELEASE_VERSION = "0.10.50"\nRELEASE_VERSION = "0.10.51"',
              1,
          )
          marker = 'install_dashboard_health_tile()\n_replace_mcp_client()\n'
          replacement = (
              'install_dashboard_health_tile()\n'
              '# Build an explicit route-priority catalogue before installing wrappers. In this\n'
              '# milestone it is diagnostic-only, preserving existing proven execution paths.\n'
              'application.route_registry = build_route_registry()\n'
              '_replace_mcp_client()\n'
          )
          if marker not in text:
              raise SystemExit('entrypoint route registry marker missing')
          entry.write_text(text.replace(marker, replacement, 1), encoding='utf-8')

          replacements = {
              root / 'hubitat-mcp-ai/config.yaml': [('version: "0.10.50"', 'version: "0.10.51"')],
              root / 'hubitat-mcp-ai/rootfs/app/device_intelligence_webui.py': [('PWA_RELEASE_VERSION = "0.10.50"', 'PWA_RELEASE_VERSION = "0.10.51"')],
              root / 'hubitat-mcp-ai/README.md': [('Current add-on version: **0.10.50**', 'Current add-on version: **0.10.51**')],
              root / 'scripts/setup-homebrain-ollama-cloud.ps1': [('Hubitat MCP AI 0.10.50.', 'Hubitat MCP AI 0.10.51.')],
          }
          for path, pairs in replacements.items():
              data = path.read_text(encoding='utf-8')
              for old, new in pairs:
                  if old not in data:
                      raise SystemExit(f'missing release marker in {path}: {old}')
                  data = data.replace(old, new, 1)
              path.write_text(data, encoding='utf-8')

          changelog = root / 'hubitat-mcp-ai/CHANGELOG.md'
          data = changelog.read_text(encoding='utf-8')
          section = (
              '## 0.10.51\n\n'
              '- Adds an explicit typed route-priority catalogue without changing proven execution paths.\n'
              '- Protects authoritative device measurements and destructive hub workflows with regression tests.\n'
              '- Establishes stable route diagnostics for the next startup and handler migration phase.\n\n'
          )
          if '## 0.10.51' not in data:
              data = data.replace('# Hubitat MCP AI changelog\n\n', '# Hubitat MCP AI changelog\n\n' + section, 1)
          changelog.write_text(data, encoding='utf-8')

          gate = root / 'scripts/run_release_gate.py'
          data = gate.read_text(encoding='utf-8')
          marker = '    "tests/test_hubitat_mcp_ai_release_metadata.py",\n'
          addition = marker + '    "tests/test_hubitat_mcp_ai_route_registry.py",\n    "tests/test_deterministic_entity_read.py",\n'
          if 'test_hubitat_mcp_ai_route_registry.py' not in data:
              if marker not in data:
                  raise SystemExit('release gate insertion marker missing')
              data = data.replace(marker, addition, 1)
          gate.write_text(data, encoding='utf-8')

          tests = root / 'tests/test_deterministic_entity_read.py'
          data = tests.read_text(encoding='utf-8')
          data = data.replace('"Bathroom Climate Sensor is 46 %."', '"Bathroom Climate humidity is 46%."')
          data = data.replace('"Environmental Sensor B is 61 %."', '"Environmental B humidity is 61%."')
          data = data.replace('"Hallway Contact is 88 %."', '"Hallway Contact is 88%."')
          tests.write_text(data, encoding='utf-8')
          PY
      - name: Compile changed runtime
        run: python -m py_compile hubitat-mcp-ai/rootfs/app/route_registry.py hubitat-mcp-ai/rootfs/app/route_catalogue.py hubitat-mcp-ai/rootfs/app/entrypoint.py
      - name: Run blocking release gate
        run: python scripts/run_release_gate.py
      - name: Validate add-on layout
        run: python scripts/validate_addon.py
      - name: Commit tested release
        shell: bash
        run: |
          rm -f .github/route-registry-0.10.51-trigger .github/workflows/apply-route-registry-0.10.51.yml
          git config user.name 'HomeBrain Release Bot'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'Release Hubitat MCP AI 0.10.51 route registry foundation'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
