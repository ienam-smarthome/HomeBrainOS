name: Apply measurement wording 0.10.43

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/measurement-wording-trigger

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/measurement-wording-0.10.43'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply deterministic measurement wording polish
        shell: bash
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          root = Path('.')
          orchestrator = root / 'hubitat-mcp-ai/rootfs/app/mcp_agent_orchestrator.py'
          text = orchestrator.read_text(encoding='utf-8')

          marker = '''async def _load_authoritative_inventory(application: Any) -> tuple[Any, list[dict[str, Any]]]:\n'''
          helper = '''def _format_attribute_value(value: Any, unit: str) -> str:\n    text = str(value).strip()\n    if not unit:\n        return text\n    if unit in {"%", "°C"}:\n        return f"{text}{unit}"\n    return f"{text} {unit}"\n\n\ndef _format_attribute_message(label: str, attribute: str, value: Any, unit: str) -> str:\n    formatted = _format_attribute_value(value, unit)\n    if attribute == "humidity":\n        normalised_label = _normalise(label)\n        if "humidity" not in normalised_label:\n            room = re.sub(r"\\b(?:meter|sensor)\\b", " ", label, flags=re.IGNORECASE)\n            room = re.sub(r"\\s+", " ", room).strip(" -")\n            if room:\n                return f"{room} humidity is {formatted}."\n    return f"{label} is {formatted}."\n\n\n'''
          if helper not in text:
              if marker not in text:
                  raise SystemExit('Could not find inventory helper insertion marker')
              text = text.replace(marker, helper + marker, 1)

          old = '        message = f"{label} is {value} {unit}."\n'
          new = '        message = _format_attribute_message(label, attribute, value, unit)\n'
          if old not in text and new not in text:
              raise SystemExit('Could not find deterministic measurement message line')
          text = text.replace(old, new, 1)
          orchestrator.write_text(text, encoding='utf-8')

          test_candidates = list(root.glob('tests/**/test*mcp*agent*orchestrator*.py'))
          if not test_candidates:
              test_candidates = [p for p in root.glob('tests/**/*.py') if 'test_lux_question_reads_authoritative_attribute' in p.read_text(encoding='utf-8', errors='ignore')]
          if not test_candidates:
              raise SystemExit('Could not locate MCP agent orchestrator tests')
          test_path = test_candidates[0]
          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as env_file:
              env_file.write(f'TEST_PATH={test_path.as_posix()}\n')
          tests = test_path.read_text(encoding='utf-8')
          addition = '''\n\ndef test_measurement_wording_formats_humidity_naturally():\n    from mcp_agent_orchestrator import _format_attribute_message\n\n    assert _format_attribute_message("Bathroom meter", "humidity", 66, "%") == "Bathroom humidity is 66%."\n\n\ndef test_measurement_wording_preserves_standard_unit_spacing():\n    from mcp_agent_orchestrator import _format_attribute_message\n\n    assert _format_attribute_message("Freezer (MQTT)", "power", 74, "W") == "Freezer (MQTT) is 74 W."\n    assert _format_attribute_message("FP2 Bedroom 3 Lux", "illuminance", 212, "lux") == "FP2 Bedroom 3 Lux is 212 lux."\n    assert _format_attribute_message("Bedroom meter", "temperature", 21.5, "°C") == "Bedroom meter is 21.5°C."\n'''
          if 'test_measurement_wording_formats_humidity_naturally' not in tests:
              test_path.write_text(tests.rstrip() + addition + '\n', encoding='utf-8')

          def replace(path: Path, old: str, new: str):
              data = path.read_text(encoding='utf-8')
              if old not in data and new not in data:
                  raise SystemExit(f'Missing version marker in {path}: {old!r}')
              path.write_text(data.replace(old, new), encoding='utf-8')

          replace(root / 'hubitat-mcp-ai/config.yaml', 'version: "0.10.42"', 'version: "0.10.43"')
          replace(root / 'hubitat-mcp-ai/rootfs/app/entrypoint.py', 'PREVIOUS_RELEASE_VERSION = "0.10.41"\nRELEASE_VERSION = "0.10.42"', 'PREVIOUS_RELEASE_VERSION = "0.10.42"\nRELEASE_VERSION = "0.10.43"')
          replace(root / 'hubitat-mcp-ai/rootfs/app/device_intelligence_webui.py', 'PWA_RELEASE_VERSION = "0.10.42"', 'PWA_RELEASE_VERSION = "0.10.43"')

          changelog = root / 'hubitat-mcp-ai/CHANGELOG.md'
          data = changelog.read_text(encoding='utf-8')
          section = '''## 0.10.43\n\n- Polishes deterministic sensor responses with natural room-and-metric wording.\n- Formats percentages and temperatures without an unnecessary space before the unit.\n- Preserves conventional spacing for power, energy and illuminance values.\n\n'''
          if '## 0.10.43' not in data:
              heading = '# Hubitat MCP AI changelog\n\n'
              if heading not in data:
                  raise SystemExit('Could not find changelog heading')
              changelog.write_text(data.replace(heading, heading + section, 1), encoding='utf-8')

          release_notes = root / 'hubitat-mcp-ai/CHANGELOG-0.10.43.md'
          release_notes.write_text('''# Hubitat MCP AI 0.10.43\n\n## Natural deterministic measurement responses\n\n- Bathroom humidity now reads as `Bathroom humidity is 66%.` rather than `Bathroom meter is 66 %.`\n- Percent and Celsius values are formatted without a space before the unit.\n- Power, energy and lux values keep their standard unit spacing.\n- Added regression coverage for humidity, temperature, power and illuminance wording.\n''', encoding='utf-8')

          for path in root.glob('tests/**/*.py'):
              source = path.read_text(encoding='utf-8', errors='ignore')
              updated = source.replace('version: "0.10.42"', 'version: "0.10.43"')
              updated = updated.replace('PREVIOUS_RELEASE_VERSION = "0.10.41"', 'PREVIOUS_RELEASE_VERSION = "0.10.42"')
              updated = updated.replace('RELEASE_VERSION = "0.10.42"', 'RELEASE_VERSION = "0.10.43"')
              updated = updated.replace('PWA_RELEASE_VERSION = "0.10.42"', 'PWA_RELEASE_VERSION = "0.10.43"')
              updated = updated.replace('## 0.10.42', '## 0.10.43')
              if updated != source:
                  path.write_text(updated, encoding='utf-8')
          PY

      - name: Run focused regression tests
        run: python -m pytest -q "$TEST_PATH"

      - name: Commit release to pull request branch
        shell: bash
        run: |
          rm -f .github/measurement-wording-trigger .github/placeholder-unused
          git config user.name "HomeBrain Release Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Polish deterministic measurement wording (0.10.43)"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
