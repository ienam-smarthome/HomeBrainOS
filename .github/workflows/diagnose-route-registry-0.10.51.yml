name: Diagnose route registry 0.10.51
on:
  pull_request:
    branches: [main]
    paths: [.github/route-registry-0.10.51-diagnose]
permissions:
  contents: write
jobs:
  diagnose:
    if: github.head_ref == 'milestone/route-registry-0.10.51'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply same release patch
        run: |
          python - <<'PY'
          from pathlib import Path
          root=Path('.')
          p=root/'hubitat-mcp-ai/rootfs/app/entrypoint.py'; s=p.read_text()
          if 'from route_catalogue import build_route_registry' not in s: s=s.replace('from request_tracing import install_request_tracing\n','from request_tracing import install_request_tracing\nfrom route_catalogue import build_route_registry\n',1)
          s=s.replace('PREVIOUS_RELEASE_VERSION = "0.10.49"\nRELEASE_VERSION = "0.10.50"','PREVIOUS_RELEASE_VERSION = "0.10.50"\nRELEASE_VERSION = "0.10.51"',1)
          if 'application.route_registry = build_route_registry()' not in s: s=s.replace('install_dashboard_health_tile()\n_replace_mcp_client()\n','install_dashboard_health_tile()\napplication.route_registry = build_route_registry()\n_replace_mcp_client()\n',1)
          p.write_text(s)
          for path,old,new in [
            ('hubitat-mcp-ai/config.yaml','version: "0.10.50"','version: "0.10.51"'),
            ('hubitat-mcp-ai/rootfs/app/device_intelligence_webui.py','PWA_RELEASE_VERSION = "0.10.50"','PWA_RELEASE_VERSION = "0.10.51"'),
            ('hubitat-mcp-ai/README.md','Current add-on version: **0.10.50**','Current add-on version: **0.10.51**'),
            ('scripts/setup-homebrain-ollama-cloud.ps1','Hubitat MCP AI 0.10.50.','Hubitat MCP AI 0.10.51.'),
          ]:
            p=root/path; p.write_text(p.read_text().replace(old,new,1))
          p=root/'hubitat-mcp-ai/CHANGELOG.md'; s=p.read_text();
          if '## 0.10.51' not in s: s=s.replace('# Hubitat MCP AI changelog\n\n','# Hubitat MCP AI changelog\n\n## 0.10.51\n\n- Adds an explicit typed route-priority catalogue.\n\n',1)
          p.write_text(s)
          p=root/'scripts/run_release_gate.py'; s=p.read_text(); marker='    "tests/test_hubitat_mcp_ai_release_metadata.py",\n'
          if 'test_hubitat_mcp_ai_route_registry.py' not in s: s=s.replace(marker,marker+'    "tests/test_hubitat_mcp_ai_route_registry.py",\n    "tests/test_deterministic_entity_read.py",\n',1)
          p.write_text(s)
          p=root/'tests/test_deterministic_entity_read.py'; s=p.read_text(); s=s.replace('"Bathroom Climate Sensor is 46 %."','"Bathroom Climate humidity is 46%."').replace('"Environmental Sensor B is 61 %."','"Environmental B humidity is 61%."').replace('"Hallway Contact is 88 %."','"Hallway Contact is 88%."'); p.write_text(s)
          PY
          rm -f .github/route-registry-0.10.51-* .github/workflows/apply-route-registry-0.10.51*.yml .github/workflows/diagnose-route-registry-0.10.51.yml
      - name: Capture gate result
        shell: bash
        run: |
          set +e
          python scripts/run_release_gate.py > /tmp/gate.log 2>&1
          code=$?
          if [ $code -ne 0 ]; then
            cp /tmp/gate.log route-registry-gate-failure.txt
            git config user.name 'HomeBrain CI Diagnostics'
            git config user.email 'actions@users.noreply.github.com'
            git add -A
            git commit -m 'Capture 0.10.51 CI gate failure'
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi
          cat /tmp/gate.log
          exit $code
