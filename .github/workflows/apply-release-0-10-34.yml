name: Apply release 0.10.34
on:
  push:
    branches:
      - agent/fix-optional-now-power-0.10.34
  pull_request:
    branches:
      - main
permissions:
  contents: write
jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-optional-now-power-0.10.34
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python .github/scripts/apply_release_0_10_34.py
      - run: rm .github/scripts/apply_release_0_10_34.py .github/workflows/apply-release-0-10-34.yml
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Fix whole-house power queries without now"
          git push
