name: Corrective release runner
on:
  push:
    branches:
      - agent/publish-0.10.34-corrective
permissions:
  contents: write
jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/publish-0.10.34-corrective
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python .github/scripts/apply_corrective_0_10_34.py
      - run: rm -f .github/scripts/apply_corrective_0_10_34.py .github/workflows/apply-corrective-0-10-34.yml .github/scripts/apply_release_0_10_34.py .github/workflows/apply-release-0-10-34.yml
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Publish corrective Hubitat MCP AI 0.10.34"
          git push
