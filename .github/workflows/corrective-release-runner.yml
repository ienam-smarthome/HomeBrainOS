name: Corrective release runner
on:
  pull_request:
    branches:
      - main
permissions:
  contents: write
jobs:
  apply:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'agent/publish-0.10.34-corrective'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/publish-0.10.34-corrective
          show-progress: false
      - run: python3 .github/scripts/apply_corrective_0_10_34.py
      - run: rm -f .github/scripts/apply_corrective_0_10_34.py .github/workflows/apply-corrective-0-10-34.yml .github/scripts/apply_release_0_10_34.py .github/workflows/apply-release-0-10-34.yml
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Publish corrective Hubitat MCP AI 0.10.34"
          git push
