name: Temporary patch voice station reliability

on:
  push:
    branches:
      - fix/voice-station-command-capture

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/voice-station-command-capture
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Patch voice station capture
        run: |
          python - <<'PY'
          from pathlib import Path

          for config_path in [Path('homebrainos/config.yaml'), Path('addon/homebrainos/config.yaml')]:
              text = config_path.read_text()
              text = text.replace("version: '1.7.0-alpha'", "version: '1.7.1-alpha'")
              text = text.replace("version: '1.6.9-alpha'", "version: '1.7.1-alpha'")
              config_path.write_text(text)

          path = Path('homebrainos/rootfs/app/static/index.html')
          text = path.read_text()

          text = text.replace(
          """let stationEnabled = false;\nlet stationRecognizer = null;\nlet stationRestart = null;\nlet stationArmedUntil = 0;\nlet stationArmedTick = null;""",
          """let stationEnabled = false;\nlet stationRecognizer = null;\nlet stationRestart = null;\nlet stationArmedUntil = 0;\nlet stationArmedTick = null;\nlet stationPendingWake = '';\nlet stationLastCommand = '';\nlet stationLastCommandAt = 0;\nlet stationRunningCommand = false;"""
          )

          text = text.replace(
          """function normaliseSpeech(text){\n  return String(text||'').toLowerCase().replace(/[^\\w\\s]/g,' ').replace(/\\s+/g,' ').trim();\n}""",
          """function normaliseSpeech(text){\n  return String(text||'')\n    .toLowerCase()\n    .replace(/home\\s+brain/g,'homebrain')\n    .replace(/hope\\s+brain/g,'homebrain')\n    .replace(/own\\s+brain/g,'homebrain')\n    .replace(/[^\\w\\s]/g,' ')\n    .replace(/\\s+/g,' ')\n    .trim();\n}\nfunction cleanStationCommand(text){\n  return normaliseSpeech(text)\n    .replace(/^(please|can you|could you|would you)\\s+/,'')\n    .replace(/^(homebrain|hey homebrain|hi homebrain|hello homebrain|okay homebrain|ok homebrain)\\s+/,'')\n    .trim();\n}\nfunction stationDuplicateCommand(command){\n  const now=Date.now();\n  const clean=cleanStationCommand(command);\n  if(clean && clean===stationLastCommand && now-stationLastCommandAt<4500) return true;\n  stationLastCommand=clean;\n  stationLastCommandAt=now;\n  return false;\n}"""
          )

          text = text.replace(
          """function clearStationArmed(){\n  stationArmedUntil=0;\n  clearInterval(stationArmedTick);\n  stationArmedTick=null;\n}""",
          """function clearStationArmed(){\n  stationArmedUntil=0;\n  stationPendingWake='';\n  clearInterval(stationArmedTick);\n  stationArmedTick=null;\n}"""
          )

          text = text.replace(
          """function wakePhraseCommand(transcript){\n  const spoken=normaliseSpeech(transcript).replace(/\\bhome brain\\b/g,'homebrain');\n  const phrases=['hey homebrain','hi homebrain','hello homebrain','okay homebrain','ok homebrain','homebrain'];\n  for(const phrase of phrases){\n    const idx=spoken.indexOf(phrase);\n    if(idx>=0){\n      return {heard:true, command:spoken.slice(idx+phrase.length).replace(/^[,.\\s]+/,'').trim()};\n    }\n  }\n  return {heard:false, command:''};\n}\nfunction stationCommandFromTranscript(transcript){\n  const wake=wakePhraseCommand(transcript);\n  if(wake.heard){\n    if(wake.command) return wake.command;\n    armVoiceStation(15000);\n    return null;\n  }\n  if(stationIsArmed()){\n    clearStationArmed();\n    return normaliseSpeech(transcript);\n  }\n  return '';\n}""",
          """function wakePhraseCommand(transcript){\n  const spoken=normaliseSpeech(transcript);\n  const phrases=['hey homebrain','hi homebrain','hello homebrain','okay homebrain','ok homebrain','homebrain','hey home brain','hi home brain','okay home brain','ok home brain'];\n  for(const phrase of phrases){\n    const p=normaliseSpeech(phrase);\n    const idx=spoken.indexOf(p);\n    if(idx>=0){\n      return {heard:true, before:spoken.slice(0,idx).trim(), command:cleanStationCommand(spoken.slice(idx+p.length))};\n    }\n  }\n  return {heard:false, before:'', command:''};\n}\nfunction stationCommandFromTranscript(transcript){\n  const spoken=normaliseSpeech(transcript);\n  if(!spoken) return '';\n  const wake=wakePhraseCommand(spoken);\n  if(wake.heard){\n    if(wake.command){\n      clearStationArmed();\n      return wake.command;\n    }\n    stationPendingWake=spoken;\n    armVoiceStation(18000);\n    return null;\n  }\n  if(stationIsArmed()){\n    const command=cleanStationCommand(spoken);\n    if(command.length<2){\n      armVoiceStation(12000);\n      return null;\n    }\n    clearStationArmed();\n    return command;\n  }\n  return '';\n}"""
          )

          text = text.replace(
          """function startVoiceStation(){\n  stopSpeaking();\n  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;\n  if(!SR){alert('Voice station needs Chrome or Edge speech recognition');return;}\n  stationEnabled=true;\n  clearStationArmed();\n  setVoiceOverlay(true,'Voice station is active. Say \"Hey HomeBrain\", then your command. You can pause briefly after the wake phrase.');\n  const startLoop=()=>{\n    if(!stationEnabled) return;\n    const r=new SR();\n    stationRecognizer=r;\n    r.lang='en-GB';\n    r.continuous=true;\n    r.interimResults=false;\n    r.maxAlternatives=1;\n    r.onstart=()=>{setListening(true);refreshStationStatus();};\n    r.onerror=e=>{\n      if(['no-speech','aborted'].includes(e.error||'')){refreshStationStatus();return;}\n      setStationStatus('Voice station microphone error: '+(e.error||'unknown'));\n    };\n    r.onend=()=>{setListening(stationIsArmed());refreshStationStatus();if(stationEnabled) stationRestart=setTimeout(startLoop,450);};\n    r.onresult=e=>{\n      for(let i=e.resultIndex;i<e.results.length;i++){\n        const transcript=e.results[i][0].transcript||'';\n        const command=stationCommandFromTranscript(transcript);\n        if(command===null) continue;\n        if(!command){\n          if(stationIsArmed()){\n            setStationStatus('Wake phrase heard. Say the command now ...', true);\n            continue;\n          }\n          setStationStatus('Heard \"'+transcript+'\". Waiting for Hey HomeBrain ...', true);\n          continue;\n        }\n        $('q').value=command;\n        setStationStatus('Running: '+command, true);\n        ask();\n      }\n    };\n    try{r.start();}catch(e){setStationStatus('Voice station could not start: '+e.message);}\n  };\n  startLoop();\n}""",
          """function startVoiceStation(){\n  stopSpeaking();\n  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;\n  if(!SR){alert('Voice station needs Chrome or Edge speech recognition. Use Chrome or Edge over HTTPS, or Home Assistant local access.');return;}\n  stationEnabled=true;\n  clearStationArmed();\n  clearTimeout(stationRestart);\n  setVoiceOverlay(true,'Voice station is active. Say \"Hey HomeBrain\" and the full command, or pause briefly after the wake phrase.');\n  const startLoop=()=>{\n    if(!stationEnabled || stationRunningCommand) return;\n    clearTimeout(stationRestart);\n    const r=new SR();\n    stationRecognizer=r;\n    r.lang='en-GB';\n    r.continuous=true;\n    r.interimResults=true;\n    r.maxAlternatives=3;\n    r.onstart=()=>{setListening(true);refreshStationStatus();};\n    r.onerror=e=>{\n      const err=e.error||'unknown';\n      if(['no-speech','aborted'].includes(err)){refreshStationStatus();return;}\n      if(err==='not-allowed' || err==='service-not-allowed') setStationStatus('Microphone blocked. Allow microphone access, then start voice station again.');\n      else if(err==='network') setStationStatus('Voice recognition network error. Browser speech recognition may need internet access.');\n      else setStationStatus('Voice station microphone error: '+err);\n    };\n    r.onend=()=>{\n      setListening(false);\n      refreshStationStatus();\n      if(stationEnabled && !stationRunningCommand) stationRestart=setTimeout(startLoop,900);\n    };\n    r.onresult=e=>{\n      let heardFinal=false;\n      for(let i=e.resultIndex;i<e.results.length;i++){\n        const result=e.results[i];\n        const transcript=result[0].transcript||'';\n        const command=stationCommandFromTranscript(transcript);\n        if(command===null) continue;\n        if(!command){\n          if(stationIsArmed()) setStationStatus('Wake phrase heard. Say the full command now ...', true);\n          else setStationStatus('Heard \"'+transcript+'\". Waiting for Hey HomeBrain ...', true);\n          continue;\n        }\n        if(!result.isFinal && command.split(' ').length<3){\n          setStationStatus('Heard command start: '+command+' ...', true);\n          continue;\n        }\n        if(stationDuplicateCommand(command)) continue;\n        heardFinal=true;\n        stationRunningCommand=true;\n        clearStationArmed();\n        $('q').value=command;\n        setStationStatus('Running: '+command, true);\n        try{r.stop();}catch(err){}\n        Promise.resolve(ask()).finally(()=>{\n          stationRunningCommand=false;\n          if(stationEnabled) stationRestart=setTimeout(startLoop,1200);\n        });\n        break;\n      }\n      if(heardFinal) refreshStationStatus();\n    };\n    try{r.start();}catch(e){\n      setStationStatus('Voice station could not start: '+e.message);\n      if(stationEnabled) stationRestart=setTimeout(startLoop,1200);\n    }\n  };\n  startLoop();\n}"""
          )

          mirror = Path('addon/homebrainos/rootfs/app/static/index.html')
          if mirror.exists():
              mirror.write_text(text)
          path.write_text(text)
          PY

      - name: Remove temporary workflow and commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/_temporary_patch_voice_station.yml
          git add homebrainos/config.yaml addon/homebrainos/config.yaml homebrainos/rootfs/app/static/index.html addon/homebrainos/rootfs/app/static/index.html
          git commit -m "Improve voice station command capture"
          git push origin HEAD:fix/voice-station-command-capture
