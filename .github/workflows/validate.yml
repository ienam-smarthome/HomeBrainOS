name: Validate HomeBrain OS

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate repository layout
        run: python scripts/validate_addon.py
      - name: Python syntax check
        run: python -m compileall backend addon/homebrainos/rootfs/app homebrainos/rootfs/app
      - name: Install test dependencies
        run: python -m pip install -r requirements.txt pytest
      - name: Run tests
        run: python -m pytest
