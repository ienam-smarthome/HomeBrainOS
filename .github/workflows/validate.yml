name: Validate HomeBrain OS

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate repository layout
        env:
          HUBITAT_MCP_AI_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: python scripts/validate_addon.py
      - name: Python syntax check
        run: python -m compileall backend addon/homebrainos/rootfs/app homebrainos/rootfs/app hubitat-mcp-ai/rootfs/app
      - name: Install test dependencies
        run: python -m pip install -r requirements-test.txt
      - name: Run blocking release gate
        shell: bash
        run: |
          set -o pipefail
          python scripts/run_release_gate.py 2>&1 | tee pytest-output.txt
      - name: Upload pytest failure output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-failure-output
          path: pytest-output.txt
          retention-days: 3

  legacy-audit:
    name: Full legacy regression audit (non-blocking)
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install test dependencies
        run: python -m pip install -r requirements-test.txt
      - name: Run historical full suite
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q 2>&1 | tee pytest-legacy-output.txt
      - name: Upload legacy audit output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: full-legacy-audit-output
          path: pytest-legacy-output.txt
          retention-days: 7
