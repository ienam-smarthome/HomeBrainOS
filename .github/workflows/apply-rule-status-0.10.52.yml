name: Apply rule status 0.10.52

on:
  pull_request:
    branches: [main]
    paths:
      - .github/rule-status-0.10.52-trigger

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/rule-disabled-status-0.10.52'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test dependencies
        run: python -m pip install -r requirements-test.txt
      - name: Apply rule state precedence fix
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path('.')
          fast = root / 'hubitat-mcp-ai/rootfs/app/fast_fallback_inventory.py'
          text = fast.read_text(encoding='utf-8')
          old = '''            state = "unknown"\n            status = first_value(item, "status", "state")\n            paused = first_value(item, "paused", "isPaused")\n            enabled = first_value(item, "enabled", "active")\n            if paused not in (None, ""):\n                is_paused = bool_label(paused) == "Yes"\n                state = "inactive" if is_paused else "active"\n                status = "Paused" if is_paused else "Active"\n            elif enabled not in (None, ""):\n                is_enabled = bool_label(enabled) == "Yes"\n                state = "active" if is_enabled else "inactive"\n                status = "Active" if is_enabled else "Disabled"\n            else:\n                normalised_status = _normalise(status)\n                if normalised_status in _ACTIVE_RULE_STATES:\n                    state = "active"\n                    status = normalised_status.title()\n                elif normalised_status in _INACTIVE_RULE_STATES:\n                    state = "inactive"\n                    status = normalised_status.title()\n                else:\n                    status = "Status not exposed"\n'''
          new = '''            state = "unknown"\n            status = first_value(item, "status", "state")\n            normalised_status = _normalise(status)\n            disabled = first_value(item, "disabled", "isDisabled")\n            paused = first_value(item, "paused", "isPaused")\n            enabled = first_value(item, "enabled", "active")\n\n            # Negative state flags must win. Hubitat includes paused=false on every\n            # rule, so treating that alone as Active masks disabled=true.\n            if disabled not in (None, "") and bool_label(disabled) == "Yes":\n                state = "inactive"\n                status = "Disabled"\n            elif paused not in (None, "") and bool_label(paused) == "Yes":\n                state = "inactive"\n                status = "Paused"\n            elif normalised_status in _ACTIVE_RULE_STATES:\n                state = "active"\n                status = normalised_status.title()\n            elif normalised_status in _INACTIVE_RULE_STATES:\n                state = "inactive"\n                status = normalised_status.title()\n            elif enabled not in (None, ""):\n                is_enabled = bool_label(enabled) == "Yes"\n                state = "active" if is_enabled else "inactive"\n                status = "Active" if is_enabled else "Disabled"\n            elif disabled not in (None, "") and bool_label(disabled) == "No":\n                state = "active"\n                status = "Active"\n            else:\n                status = "Status not exposed"\n'''
          if old not in text:
              raise SystemExit('fast fallback rule-state block not found')
          fast.write_text(text.replace(old, new, 1), encoding='utf-8')

          presenter = root / 'hubitat-mcp-ai/rootfs/app/presenter.py'
          text = presenter.read_text(encoding='utf-8')
          old = '''        status = first_value(item, "status", "state")\n        paused = first_value(item, "paused", "isPaused")\n        enabled = first_value(item, "enabled", "active")\n        if paused not in (None, ""):\n            status = "Paused" if bool_label(paused) == "Yes" else "Active"\n        elif enabled not in (None, ""):\n            status = "Active" if bool_label(enabled) == "Yes" else "Disabled"\n        rows.append({"name": str(name), "id": rule_id, "status": str(status or "Available")})\n'''
          new = '''        status = first_value(item, "status", "state")\n        normalised_status = normalise_text(status).lower()\n        disabled = first_value(item, "disabled", "isDisabled")\n        paused = first_value(item, "paused", "isPaused")\n        enabled = first_value(item, "enabled", "active")\n        if disabled not in (None, "") and bool_label(disabled) == "Yes":\n            status = "Disabled"\n        elif paused not in (None, "") and bool_label(paused) == "Yes":\n            status = "Paused"\n        elif normalised_status in {"active", "enabled", "running"}:\n            status = normalised_status.title()\n        elif normalised_status in {"paused", "disabled", "inactive", "stopped"}:\n            status = normalised_status.title()\n        elif enabled not in (None, ""):\n            status = "Active" if bool_label(enabled) == "Yes" else "Disabled"\n        elif disabled not in (None, "") and bool_label(disabled) == "No":\n            status = "Active"\n        else:\n            status = "Status not exposed"\n        rows.append({"name": str(name), "id": rule_id, "status": str(status)})\n'''
          if old not in text:
              raise SystemExit('presenter rule-state block not found')
          presenter.write_text(text.replace(old, new, 1), encoding='utf-8')

          test = root / 'tests/test_hubitat_mcp_ai_rule_inventory_accuracy.py'
          text = test.read_text(encoding='utf-8')
          addition = '''\n\ndef test_disabled_flag_wins_over_paused_false_and_status_is_counted_correctly():\n    rules = [\n        {\n            "id": "1",\n            "name": "Disabled media rule",\n            "disabled": True,\n            "paused": False,\n            "status": "disabled",\n        },\n        {\n            "id": "2",\n            "name": "Active lighting rule",\n            "disabled": False,\n            "paused": False,\n            "status": "active",\n        },\n    ]\n    answer = asyncio.run(\n        FastFallbackRouter(FakeRulesMCP(rules)).answer("List automation rules")\n    )\n\n    assert "Disabled media rule: Disabled" in answer["message"]\n    assert "Active lighting rule: Active" in answer["message"]\n    metrics = {item["label"]: item["value"] for item in answer["display"]["metrics"]}\n    assert metrics["Active"] == "1"\n    assert metrics["Inactive"] == "1"\n    assert metrics["Status unknown"] == "0"\n'''
          if 'test_disabled_flag_wins_over_paused_false' not in text:
              test.write_text(text.rstrip() + addition + '\n', encoding='utf-8')

          def replace(path, old, new):
              data = path.read_text(encoding='utf-8')
              if old not in data:
                  raise SystemExit(f'missing release marker in {path}: {old}')
              path.write_text(data.replace(old, new), encoding='utf-8')

          replace(root/'hubitat-mcp-ai/config.yaml', 'version: "0.10.51"', 'version: "0.10.52"')
          replace(root/'hubitat-mcp-ai/rootfs/app/entrypoint.py', 'PREVIOUS_RELEASE_VERSION = "0.10.50"\nRELEASE_VERSION = "0.10.51"', 'PREVIOUS_RELEASE_VERSION = "0.10.51"\nRELEASE_VERSION = "0.10.52"')
          replace(root/'hubitat-mcp-ai/rootfs/app/device_intelligence_webui.py', 'PWA_RELEASE_VERSION = "0.10.51"', 'PWA_RELEASE_VERSION = "0.10.52"')
          replace(root/'hubitat-mcp-ai/README.md', 'Current add-on version: **0.10.51**', 'Current add-on version: **0.10.52**')
          replace(root/'scripts/setup-homebrain-ollama-cloud.ps1', 'Update and restart Hubitat MCP AI 0.10.51.', 'Update and restart Hubitat MCP AI 0.10.52.')

          changelog = root/'hubitat-mcp-ai/CHANGELOG.md'
          data = changelog.read_text(encoding='utf-8')
          section = '''## 0.10.52\n\n- Correctly classifies disabled Rule Machine rules when Hubitat also reports `paused: false`.\n- Gives explicit disabled and paused states precedence over generic false flags.\n- Keeps active, inactive and unknown rule counts aligned with the authoritative MCP response.\n\n'''
          if '## 0.10.52' not in data:
              changelog.write_text(data.replace('# Hubitat MCP AI changelog\n\n', '# Hubitat MCP AI changelog\n\n' + section, 1), encoding='utf-8')
          (root/'hubitat-mcp-ai/CHANGELOG-0.10.52.md').write_text('''# Hubitat MCP AI 0.10.52\n\n- Fixes disabled rules being displayed as Active when `paused: false` is also present.\n- Uses authoritative `disabled`, `paused`, and `status` fields in safe precedence order.\n- Adds regression coverage for mixed active and disabled rule inventories.\n''', encoding='utf-8')
          PY
      - name: Remove temporary release files
        run: rm -f .github/workflows/apply-rule-status-0.10.52.yml .github/rule-status-0.10.52-trigger
      - name: Compile changed Python
        run: python -m py_compile hubitat-mcp-ai/rootfs/app/fast_fallback_inventory.py hubitat-mcp-ai/rootfs/app/presenter.py
      - name: Run focused regression
        run: python -m pytest -q tests/test_hubitat_mcp_ai_rule_inventory_accuracy.py
      - name: Run blocking release gate
        run: python scripts/run_release_gate.py
      - name: Validate add-on layout
        run: python scripts/validate_ha_addon.py
      - name: Commit tested release
        run: |
          git config user.name "HomeBrain Release Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Fix disabled automation rule status (0.10.52)"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
