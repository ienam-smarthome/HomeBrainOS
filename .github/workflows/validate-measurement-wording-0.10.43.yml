name: Validate measurement wording 0.10.43

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/full-validation-trigger

permissions:
  contents: read

jobs:
  validate:
    if: github.head_ref == 'agent/measurement-wording-0.10.43'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run full test suite
        run: python -m pytest -q
