name: Apply app capability diagnostic 0.10.56

on:
  push:
    branches:
      - feature/app-management-capability-0.10.56

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/app-management-capability-0.10.56
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test dependencies
        run: python -m pip install -r requirements-test.txt
      - name: Apply app capability diagnostic
        shell: bash
        run: |
          cat > hubitat-mcp-ai/rootfs/app/app_management_capability.py <<'PY'
          from __future__ import annotations

          import re
          import time
          from typing import Any, Awaitable, Callable

          from presenter import display_payload, safe_debug


          AskHandler = Callable[[Any], Awaitable[dict[str, Any]]]
          _QUERY_RE = re.compile(
              r"\b(?:check|show|test|diagnose|what(?:'s| is)|can you|does (?:the )?mcp)\b.*\b(?:app|apps|application|applications)\b.*\b(?:capabilit|support|manage|management|enable|disable|control)|\bcan (?:you|homebrain) (?:enable|disable|manage|control) (?:hubitat )?apps?\b",
              re.IGNORECASE,
          )

          INVENTORY_TOOLS = {
              "hub_list_apps",
              "hub_read_apps",
              "hub_get_apps",
              "hub_list_applications",
              "hub_read_applications",
          }
          DETAIL_TOOLS = {
              "hub_get_app",
              "hub_read_app",
              "hub_get_application",
              "hub_read_application",
          }
          WRITE_TOOLS = {
              "hub_set_app_disabled",
              "hub_set_app_enabled",
              "hub_enable_app",
              "hub_disable_app",
              "hub_update_app",
              "hub_set_application_disabled",
              "hub_set_application_enabled",
          }


          def is_app_capability_query(query: str) -> bool:
              return bool(_QUERY_RE.search(str(query or "")))


          async def inspect_app_management_capability(client: Any, *, refresh: bool = True) -> dict[str, Any]:
              tools = await client.list_tools(refresh=refresh)
              visible = {str(tool.name) for tool in tools}
              descriptions = {str(tool.name): str(getattr(tool, "description", "") or "") for tool in tools}
              gateway_map = await client.gateway_map(refresh=refresh) if hasattr(client, "gateway_map") else {}
              hidden = {str(name) for name in gateway_map}
              available = visible | hidden

              # Some MCP servers advertise contained operations only in gateway descriptions.
              described: set[str] = set()
              for description in descriptions.values():
                  described.update(re.findall(r"\bhub_[a-z0-9_]+\b", description.lower()))
              available |= described

              inventory = sorted(available & INVENTORY_TOOLS)
              detail = sorted(available & DETAIL_TOOLS)
              write = sorted(available & WRITE_TOOLS)
              app_named = sorted(name for name in available if "app" in name or "application" in name)

              inventory_supported = bool(inventory)
              state_readback_supported = bool(inventory or detail)
              write_supported = bool(write)
              full_control = inventory_supported and write_supported

              missing: list[str] = []
              if not inventory_supported:
                  missing.append("app inventory/read operation")
              if not write_supported:
                  missing.append("app enable/disable write operation")

              return {
                  "success": True,
                  "inventory_supported": inventory_supported,
                  "state_readback_supported": state_readback_supported,
                  "write_supported": write_supported,
                  "full_control_supported": full_control,
                  "inventory_tools": inventory,
                  "detail_tools": detail,
                  "write_tools": write,
                  "all_app_related_tools": app_named,
                  "missing": missing,
                  "suggested_mcp_contract": {
                      "read": "hub_list_apps -> apps[{id,label,name,disabled,status,type}]",
                      "write": "hub_set_app_disabled({appId, disabled}) -> {success, appId, disabled}",
                  },
              }


          def install_app_management_capability(application: Any) -> None:
              original_ask: AskHandler = application.ask

              async def ask(request: Any) -> dict[str, Any]:
                  if not is_app_capability_query(getattr(request, "query", "")):
                      return await original_ask(request)

                  started = time.perf_counter()
                  try:
                      capability = await inspect_app_management_capability(application.mcp, refresh=True)
                  except Exception as exc:
                      return {
                          "success": False,
                          "route": "mcp-app-capability-error",
                          "intent": "app-management-capability",
                          "message": f"I could not inspect the live MCP tool catalogue: {exc}",
                          "display": display_payload(
                              "diagnostic",
                              "App management capability unavailable",
                              subtitle="No app command was attempted",
                          ),
                          "elapsed_ms": round((time.perf_counter() - started) * 1000),
                          "technical": safe_debug({"error": str(exc)}),
                      }

                  if capability["full_control_supported"]:
                      message = (
                          "The connected MCP server exposes both Hubitat app inventory and app enable/disable control. "
                          "HomeBrain can now add a guarded deterministic app controller."
                      )
                      title = "App management supported"
                      tone = "success"
                  elif capability["inventory_supported"]:
                      message = (
                          "The connected MCP server can read Hubitat apps, but no app enable/disable write operation was found. "
                          "Ask the MCP developer to expose the suggested write contract shown in Technical details."
                      )
                      title = "App control write missing"
                      tone = "warning"
                  else:
                      message = (
                          "The connected MCP server does not currently expose a recognised Hubitat app inventory or app enable/disable operation. "
                          "Ask the MCP developer to add the suggested read and write contracts shown in Technical details."
                      )
                      title = "App management not exposed"
                      tone = "warning"

                  items = [
                      {
                          "icon": "📋" if capability["inventory_supported"] else "❌",
                          "title": "App inventory",
                          "value": "Available" if capability["inventory_supported"] else "Missing",
                          "subtitle": ", ".join(capability["inventory_tools"]) or "Suggested: hub_list_apps",
                          "tone": "success" if capability["inventory_supported"] else "warning",
                      },
                      {
                          "icon": "🔎" if capability["state_readback_supported"] else "❌",
                          "title": "App state read-back",
                          "value": "Available" if capability["state_readback_supported"] else "Missing",
                          "subtitle": ", ".join(capability["detail_tools"] or capability["inventory_tools"]) or "Inventory must include disabled/status",
                          "tone": "success" if capability["state_readback_supported"] else "warning",
                      },
                      {
                          "icon": "🛡️" if capability["write_supported"] else "❌",
                          "title": "Enable/disable write",
                          "value": "Available" if capability["write_supported"] else "Missing",
                          "subtitle": ", ".join(capability["write_tools"]) or "Suggested: hub_set_app_disabled",
                          "tone": "success" if capability["write_supported"] else "warning",
                      },
                  ]
                  return {
                      "success": True,
                      "route": "mcp-app-capability",
                      "intent": "app-management-capability",
                      "message": message,
                      "answered_by": "Hubitat MCP capability diagnostic",
                      "display": display_payload(
                          "diagnostic",
                          title,
                          subtitle="Live MCP tool catalogue inspection; no write was attempted",
                          metrics=[
                              {"label": "Inventory", "value": "Yes" if capability["inventory_supported"] else "No", "icon": "📋"},
                              {"label": "Read-back", "value": "Yes" if capability["state_readback_supported"] else "No", "icon": "🔎"},
                              {"label": "App writes", "value": "Yes" if capability["write_supported"] else "No", "icon": "🛡️"},
                          ],
                          items=items,
                          note="This diagnostic only reports MCP capability. It never enables or disables an app.",
                      ),
                      "elapsed_ms": round((time.perf_counter() - started) * 1000),
                      "technical": safe_debug(capability),
                  }

              application.ask = ask


          __all__ = [
              "inspect_app_management_capability",
              "install_app_management_capability",
              "is_app_capability_query",
          ]
          PY

          python - <<'PY'
          from pathlib import Path

          path = Path('hubitat-mcp-ai/rootfs/app/entrypoint.py')
          text = path.read_text()
          text = text.replace('from automation_recommendation_webui import install_automation_recommendation_webui\n', 'from automation_recommendation_webui import install_automation_recommendation_webui\nfrom app_management_capability import install_app_management_capability\n')
          text = text.replace('PREVIOUS_RELEASE_VERSION = "0.10.54"\nRELEASE_VERSION = "0.10.55"', 'PREVIOUS_RELEASE_VERSION = "0.10.55"\nRELEASE_VERSION = "0.10.56"')
          marker = 'named_rule_controller = install_named_rule_controller(application)\n'
          replacement = marker + '# Inspect live MCP app-management support before generic AI routes. This route is read-only.\ninstall_app_management_capability(application)\n'
          if marker not in text:
              raise SystemExit('entrypoint install marker not found')
          text = text.replace(marker, replacement, 1)
          path.write_text(text)

          config = Path('hubitat-mcp-ai/config.yaml')
          config.write_text(config.read_text().replace('version: "0.10.55"', 'version: "0.10.56"', 1))

          pwa = Path('hubitat-mcp-ai/rootfs/app/pwa_support.py')
          pwa.write_text(pwa.read_text().replace('PWA_RELEASE_VERSION = "0.10.55"', 'PWA_RELEASE_VERSION = "0.10.56"', 1))

          changelog = Path('hubitat-mcp-ai/CHANGELOG.md')
          body = changelog.read_text()
          changelog.write_text('## 0.10.56\n\n- Added a live MCP app-management capability diagnostic.\n- Reports app inventory, state read-back, and enable/disable write support separately.\n- Includes a developer-ready suggested MCP contract when capability is missing.\n- Diagnostic is read-only and never changes an app.\n\n' + body)
          Path('hubitat-mcp-ai/CHANGELOG-0.10.56.md').write_text('# 0.10.56\n\nAdds a deterministic live diagnostic for Hubitat app-management MCP support.\n')
          PY

          cat > tests/test_app_management_capability.py <<'PY'
          from __future__ import annotations

          import asyncio
          import sys
          from pathlib import Path
          from types import SimpleNamespace

          APP_DIR = Path(__file__).resolve().parents[1] / "hubitat-mcp-ai" / "rootfs" / "app"
          sys.path.insert(0, str(APP_DIR))

          from app_management_capability import (  # noqa: E402
              inspect_app_management_capability,
              install_app_management_capability,
              is_app_capability_query,
          )
          from mcp_client import MCPTool  # noqa: E402


          class FakeMCP:
              def __init__(self, names):
                  self.names = names

              async def list_tools(self, refresh=False):
                  return [MCPTool(name, "", {}) for name in self.names]

              async def gateway_map(self, refresh=False):
                  return {}


          def test_query_matching():
              assert is_app_capability_query("Can you disable Hubitat apps?")
              assert is_app_capability_query("Check app management capability")
              assert not is_app_capability_query("List automation rules")


          def test_detects_complete_app_contract():
              result = asyncio.run(inspect_app_management_capability(FakeMCP(["hub_list_apps", "hub_set_app_disabled"])))
              assert result["inventory_supported"] is True
              assert result["write_supported"] is True
              assert result["full_control_supported"] is True


          def test_reports_missing_write_without_guessing():
              result = asyncio.run(inspect_app_management_capability(FakeMCP(["hub_list_apps"])))
              assert result["inventory_supported"] is True
              assert result["write_supported"] is False
              assert result["full_control_supported"] is False
              assert "app enable/disable write operation" in result["missing"]


          def test_terminal_diagnostic_does_not_call_a_write():
              client = FakeMCP(["hub_list_apps"])

              async def fallback(_request):
                  return {"route": "fallback"}

              app = SimpleNamespace(mcp=client, ask=fallback)
              install_app_management_capability(app)
              answer = asyncio.run(app.ask(SimpleNamespace(query="Can you disable Hubitat apps?")))
              assert answer["route"] == "mcp-app-capability"
              assert answer["success"] is True
              assert "write operation was found" in answer["message"]
          PY

      - name: Remove temporary release workflow
        run: rm -f .github/workflows/apply-app-capability-0.10.56.yml .github/app-capability-0.10.56-trigger
      - name: Compile changed Python
        run: python -m py_compile hubitat-mcp-ai/rootfs/app/app_management_capability.py hubitat-mcp-ai/rootfs/app/entrypoint.py
      - name: Run focused tests
        run: python -m pytest -q tests/test_app_management_capability.py
      - name: Run blocking release gate
        run: python -m pytest -q $(python scripts/select_release_tests.py)
      - name: Validate add-on layout
        run: python scripts/validate_addon.py
      - name: Commit tested release
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Add app management capability diagnostic (0.10.56)"
          git push origin HEAD:feature/app-management-capability-0.10.56
