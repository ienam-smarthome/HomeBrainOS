name: Retry rule status 0.10.52

on:
  pull_request:
    branches: [main]
    paths:
      - .github/rule-status-0.10.52-retry

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/rule-disabled-status-0.10.52'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test dependencies
        run: python -m pip install -r requirements-test.txt
      - name: Apply release patch from reviewed workflow
        shell: bash
        run: |
          sed -n "/python - <<'PY'/,/^[[:space:]]*PY$/p" .github/workflows/apply-rule-status-0.10.52.yml \
            | tail -n +2 | sed '$d' | sed 's/^          //' > /tmp/apply_rule_status.py
          python /tmp/apply_rule_status.py
      - name: Remove temporary release files
        run: rm -f .github/workflows/apply-rule-status-0.10.52.yml .github/workflows/retry-rule-status-0.10.52.yml .github/rule-status-0.10.52-trigger .github/rule-status-0.10.52-retry
      - name: Compile changed Python
        run: python -m py_compile hubitat-mcp-ai/rootfs/app/fast_fallback_inventory.py hubitat-mcp-ai/rootfs/app/presenter.py
      - name: Run focused regression
        run: python -m pytest -q tests/test_hubitat_mcp_ai_rule_inventory_accuracy.py
      - name: Run blocking release gate
        run: python scripts/run_release_gate.py
      - name: Validate add-on layout
        run: python scripts/validate_addon.py
      - name: Commit tested release
        run: |
          git config user.name "HomeBrain Release Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Fix disabled automation rule status (0.10.52)"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
