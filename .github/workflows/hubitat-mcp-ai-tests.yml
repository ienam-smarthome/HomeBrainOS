name: Hubitat MCP AI tests

on:
  workflow_dispatch:
  push:
    paths:
      - "hubitat-mcp-ai/**"
      - "tests/test_hubitat_mcp_ai_*.py"
      - "requirements.txt"
      - ".github/workflows/hubitat-mcp-ai-tests.yml"
  pull_request:
    paths:
      - "hubitat-mcp-ai/**"
      - "tests/test_hubitat_mcp_ai_*.py"
      - "requirements.txt"
      - ".github/workflows/hubitat-mcp-ai-tests.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      - name: Compile Hubitat MCP AI
        run: python -m compileall -q hubitat-mcp-ai/rootfs/app

      - name: Run Hubitat MCP AI regression tests
        run: python -m pytest -q tests/test_hubitat_mcp_ai_*.py
