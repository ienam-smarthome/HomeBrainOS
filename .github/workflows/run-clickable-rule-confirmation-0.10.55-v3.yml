name: Run clickable rule confirmation 0.10.55 v3

on:
  push:
    branches:
      - fix/clickable-rule-confirmation-0.10.55-v3

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/clickable-rule-confirmation-0.10.55-v3
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test dependencies
        run: python -m pip install -r requirements-test.txt
      - name: Apply reviewed patch
        run: python .github/scripts/apply_clickable_rule_confirmation_0_10_55.py
      - name: Remove temporary release files
        run: rm -f .github/scripts/apply_clickable_rule_confirmation_0_10_55.py .github/workflows/run-clickable-rule-confirmation-0.10.55-v3.yml .github/workflows/apply-clickable-rule-confirmation-0.10.55.yml .github/workflows/apply-clickable-rule-confirmation-0.10.55-v3.yml .github/clickable-rule-confirmation-0.10.55-trigger .github/clickable-rule-confirmation-0.10.55-v3-trigger
      - name: Compile changed Python
        run: python -m py_compile hubitat-mcp-ai/rootfs/app/named_rule_control.py hubitat-mcp-ai/rootfs/app/webui_homebrain.py
      - name: Run focused rule confirmation tests
        run: python -m pytest -q tests/test_hubitat_mcp_ai_named_rule_control.py
      - name: Run blocking release gate
        run: python scripts/run_release_gate.py
      - name: Validate add-on layout
        run: python scripts/validate_addon.py
      - name: Commit tested release
        run: |
          git config user.name "HomeBrain Release Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Add clickable rule confirmation (0.10.55)"
          git push origin HEAD:fix/clickable-rule-confirmation-0.10.55-v3
