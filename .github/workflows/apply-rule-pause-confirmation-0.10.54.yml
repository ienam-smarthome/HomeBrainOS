name: Apply rule pause confirmation 0.10.54

on:
  pull_request:
    branches: [main]
    paths:
      - .github/rule-pause-confirmation-0.10.54-trigger

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/rule-pause-confirmation-0.10.54'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test dependencies
        run: python -m pip install -r requirements-test.txt
      - name: Apply truthful pause and resume confirmation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path('.')
          path = root / 'hubitat-mcp-ai/rootfs/app/named_rule_control.py'
          text = path.read_text(encoding='utf-8')

          marker = '''    ) -> dict[str, Any]:\n        if wording == "pause":\n'''
          replacement = '''    ) -> dict[str, Any]:\n        requested_paused = arguments.get("paused") if tool_name == "hub_set_rule_paused" else None\n        reported_paused = _deep_value(result.data, "paused")\n        command_verified = (\n            isinstance(requested_paused, bool)\n            and isinstance(reported_paused, bool)\n            and reported_paused is requested_paused\n        )\n        verification_source = "hub_set_rule_paused response" if command_verified else None\n\n        if wording == "pause":\n'''
          if marker not in text:
              raise SystemExit('success verification insertion marker not found')
          text = text.replace(marker, replacement, 1)

          old = '''        if wording == "pause":\n            message = f"Pause command accepted for **{rule['name']}**. It should no longer fire from its triggers."\n            note = "Hubitat MCP accepted the command but does not expose a paused-state read-back in the rule inventory."\n            title = "Rule pause requested"\n            intent_name = "automation-rule-pause-accepted"\n        elif wording == "resume":\n            message = f"Resume command accepted for **{rule['name']}**. It can fire from its triggers again."\n            note = "Hubitat MCP accepted the command but does not expose a paused-state read-back in the rule inventory."\n            title = "Rule resume requested"\n            intent_name = "automation-rule-resume-accepted"\n'''
          new = '''        if wording == "pause":\n            if command_verified:\n                message = f"Rule paused for **{rule['name']}**. Hubitat confirmed `paused: true`."\n                note = "Confirmed by the hub_set_rule_paused response."\n                title = "Rule paused"\n                intent_name = "automation-rule-pause-verified"\n            else:\n                message = f"Pause command accepted for **{rule['name']}**, but Hubitat did not return the new paused state."\n                note = "The command was accepted, but paused-state confirmation was not available."\n                title = "Rule pause requested"\n                intent_name = "automation-rule-pause-accepted"\n        elif wording == "resume":\n            if command_verified:\n                message = f"Rule resumed for **{rule['name']}**. Hubitat confirmed `paused: false`."\n                note = "Confirmed by the hub_set_rule_paused response."\n                title = "Rule resumed"\n                intent_name = "automation-rule-resume-verified"\n            else:\n                message = f"Resume command accepted for **{rule['name']}**, but Hubitat did not return the new paused state."\n                note = "The command was accepted, but paused-state confirmation was not available."\n                title = "Rule resume requested"\n                intent_name = "automation-rule-resume-accepted"\n'''
          if old not in text:
              raise SystemExit('pause/resume wording block not found')
          text = text.replace(old, new, 1)

          old = '''                    "mcp": result.data,\n                    "post_state_verified": False if wording in {"pause", "resume"} else None,\n'''
          new = '''                    "mcp": result.data,\n                    "command_verified": command_verified if wording in {"pause", "resume"} else None,\n                    "verification_source": verification_source if wording in {"pause", "resume"} else None,\n                    "reported_paused": reported_paused if wording in {"pause", "resume"} else None,\n                    "inventory_readback_verified": False if wording in {"pause", "resume"} else None,\n                    "post_state_verified": command_verified if wording in {"pause", "resume"} else None,\n'''
          if old not in text:
              raise SystemExit('technical verification block not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')

          test_path = root / 'tests/test_hubitat_mcp_ai_named_rule_control.py'
          tests = test_path.read_text(encoding='utf-8')
          addition = '''\n\ndef test_resume_uses_write_response_as_verified_confirmation():\n    client = FakeMCP()\n    answer = ask(application(client), "resume rule Appliance: Fridge and Freezer - Auto ON")\n\n    assert answer["success"] is True\n    assert answer["intent"] == "automation-rule-resume-verified"\n    assert "Rule resumed" in answer["message"]\n    assert "paused: false" in answer["message"]\n    assert answer["display"]["title"] == "Rule resumed"\n    assert answer["display"]["subtitle"] == "Confirmed by the hub_set_rule_paused response."\n    assert '"command_verified": true' in answer["technical"]\n    assert '"verification_source": "hub_set_rule_paused response"' in answer["technical"]\n    assert '"post_state_verified": true' in answer["technical"]\n    assert '"inventory_readback_verified": false' in answer["technical"]\n\n\ndef test_pause_uses_write_response_as_verified_confirmation():\n    client = FakeMCP()\n    answer = ask(application(client), "pause rule Appliance: Fridge door left door")\n\n    assert answer["intent"] == "automation-rule-pause-verified"\n    assert "Rule paused" in answer["message"]\n    assert "paused: true" in answer["message"]\n    assert answer["display"]["title"] == "Rule paused"\n'''
          if 'test_resume_uses_write_response_as_verified_confirmation' not in tests:
              test_path.write_text(tests.rstrip() + addition + '\n', encoding='utf-8')

          def replace(path: Path, old: str, new: str):
              data = path.read_text(encoding='utf-8')
              if old not in data:
                  raise SystemExit(f'missing release marker in {path}: {old}')
              path.write_text(data.replace(old, new), encoding='utf-8')

          replace(root/'hubitat-mcp-ai/config.yaml', 'version: "0.10.53"', 'version: "0.10.54"')
          replace(root/'hubitat-mcp-ai/rootfs/app/entrypoint.py', 'PREVIOUS_RELEASE_VERSION = "0.10.52"\nRELEASE_VERSION = "0.10.53"', 'PREVIOUS_RELEASE_VERSION = "0.10.53"\nRELEASE_VERSION = "0.10.54"')
          replace(root/'hubitat-mcp-ai/rootfs/app/device_intelligence_webui.py', 'PWA_RELEASE_VERSION = "0.10.53"', 'PWA_RELEASE_VERSION = "0.10.54"')
          replace(root/'hubitat-mcp-ai/README.md', 'Current add-on version: **0.10.53**', 'Current add-on version: **0.10.54**')
          replace(root/'scripts/setup-homebrain-ollama-cloud.ps1', 'Update and restart Hubitat MCP AI 0.10.53.', 'Update and restart Hubitat MCP AI 0.10.54.')

          changelog = root/'hubitat-mcp-ai/CHANGELOG.md'
          data = changelog.read_text(encoding='utf-8')
          section = '''## 0.10.54\n\n- Treats an exact `paused` value returned by `hub_set_rule_paused` as verified command confirmation.\n- Shows clear **Rule paused** and **Rule resumed** results when Hubitat confirms the requested state.\n- Separates write-response confirmation from optional rule-inventory read-back in technical details.\n\n'''
          if '## 0.10.54' not in data:
              changelog.write_text(data.replace('# Hubitat MCP AI changelog\n\n', '# Hubitat MCP AI changelog\n\n' + section, 1), encoding='utf-8')
          (root/'hubitat-mcp-ai/CHANGELOG-0.10.54.md').write_text('''# Hubitat MCP AI 0.10.54\n\n- Confirms pause and resume operations from the authoritative `hub_set_rule_paused` response.\n- Replaces the misleading no-confirmation warning when Hubitat returns the exact requested paused state.\n- Records command verification source separately from inventory read-back verification.\n''', encoding='utf-8')
          PY
      - name: Remove temporary release files
        run: rm -f .github/workflows/apply-rule-pause-confirmation-0.10.54.yml .github/rule-pause-confirmation-0.10.54-trigger
      - name: Compile changed Python
        run: python -m py_compile hubitat-mcp-ai/rootfs/app/named_rule_control.py
      - name: Run focused rule control tests
        run: python -m pytest -q tests/test_hubitat_mcp_ai_named_rule_control.py
      - name: Run blocking release gate
        run: python scripts/run_release_gate.py
      - name: Validate add-on layout
        run: python scripts/validate_addon.py
      - name: Commit tested release
        run: |
          git config user.name "HomeBrain Release Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Verify rule pause and resume responses (0.10.54)"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
