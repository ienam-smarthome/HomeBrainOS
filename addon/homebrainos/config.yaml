name: HomeBrain OS
version: '1.4.2-alpha'
slug: homebrainos
description: HomeBrain OS live dashboard with SQLite device engine and Hubitat Maker API
url: https://github.com/ienam-smarthome/HomeBrainOS
arch:
  - amd64
  - aarch64
  - armv7
startup: services
boot: auto
init: false
ports:
  8787/tcp: 8787
ports_description:
  8787/tcp: HomeBrain OS web UI
webui: http://[HOST]:[PORT:8787]
options:
  hubitat_base_url: ""
  maker_api_app_id: ""
  maker_api_token: ""
  api_token: ""
  refresh_seconds: 300
  min_full_refresh_seconds: 300
  state_sync_seconds: 120
  live_switch_sync_seconds: 60
  live_switch_sync_limit: 12
  auto_live_sync_enabled: false
  ollama_enabled: false
  ollama_base_url: "http://homeassistant.local:11434"
  ollama_model: "qwen2.5:3b"
  ollama_context_device_limit: 35
  ollama_include_hub_logs: false
  ollama_timeout_seconds: 75
  ollama_num_predict: 90
  ollama_health_timeout_seconds: 2
  ollama_health_cache_seconds: 60
  device_detail_refresh_limit: 150
  device_detail_refresh_seconds: 3000
  device_detail_refresh_batch: 30
  stale_motion_active_minutes: 30
  stale_light_on_hours: 4
  stale_device_report_hours: 24
  heating_on_delta: 1
  heating_off_setpoint: 12
  time_zone: "Europe/London"
  hubitat_logs_path: "/logs/past"
  hubitat_logs_url: ""
schema:
  hubitat_base_url: str
  maker_api_app_id: str
  maker_api_token: password
  api_token: password
  refresh_seconds: int
  min_full_refresh_seconds: int
  state_sync_seconds: int
  live_switch_sync_seconds: int
  live_switch_sync_limit: int
  auto_live_sync_enabled: bool
  ollama_enabled: bool
  ollama_base_url: str
  ollama_model: str
  ollama_context_device_limit: int
  ollama_include_hub_logs: bool
  ollama_timeout_seconds: int
  ollama_num_predict: int
  ollama_health_timeout_seconds: int
  ollama_health_cache_seconds: int
  device_detail_refresh_limit: int
  device_detail_refresh_seconds: int
  device_detail_refresh_batch: int
  stale_motion_active_minutes: int
  stale_light_on_hours: int
  stale_device_report_hours: int
  heating_on_delta: float
  heating_off_setpoint: float
  time_zone: str
  hubitat_logs_path: str
  hubitat_logs_url: str
