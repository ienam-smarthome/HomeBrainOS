name: HomeBrain OS
version: "0.7.40-alpha"
slug: homebrainos
description: HomeBrain OS live dashboard with SQLite device engine and Hubitat Maker API
url: https://github.com/ienam-smarthome/HomeBrainOS
arch:
  - amd64
  - aarch64
  - armv7
startup: services
boot: auto
init: false
ports:
  8787/tcp: 8787
ports_description:
  8787/tcp: HomeBrain OS web UI
webui: http://[HOST]:[PORT:8787]
options:
  hubitat_base_url: ""
  maker_api_app_id: ""
  maker_api_token: ""
  api_token: ""
  refresh_seconds: 30
  ollama_enabled: false
  ollama_base_url: "http://homeassistant.local:11434"
  ollama_model: "llama3.2"
  ollama_context_device_limit: 80
  ollama_include_hub_logs: true
  device_detail_refresh_limit: 150
  heating_on_delta: 1
  heating_off_setpoint: 12
  hubitat_logs_path: "/logs/past"
  hubitat_logs_url: ""
schema:
  hubitat_base_url: str
  maker_api_app_id: str
  maker_api_token: password
  api_token: password
  refresh_seconds: int
  ollama_enabled: bool
  ollama_base_url: str
  ollama_model: str
  ollama_context_device_limit: int
  ollama_include_hub_logs: bool
  device_detail_refresh_limit: int
  heating_on_delta: float
  heating_off_setpoint: float
  hubitat_logs_path: str
  hubitat_logs_url: str
