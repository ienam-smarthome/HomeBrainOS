<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HomeBrain OS</title>
  <style>
    body{margin:0;background:#0b0b0c;color:#fff;font-family:Arial,Helvetica,sans-serif}.wrap{max-width:960px;margin:auto;padding:24px}.card{background:#1f1f21;border-radius:18px;padding:16px;margin:12px 0}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}.metric{background:#303033;border-radius:14px;padding:14px}.metric.summary-tile{cursor:pointer;transition:background .15s,box-shadow .15s,transform .15s}.metric.summary-tile:hover,.metric.summary-tile:focus{background:#3a3a3d;box-shadow:inset 0 0 0 1px rgba(147,197,253,.35);outline:0}.metric.summary-tile:active{transform:translateY(1px)}.metric a{color:#93c5fd;text-decoration:none}.mini{color:#b9b9bd;font-size:12px;line-height:1.3;margin-top:4px}.big{font-size:28px;font-weight:700}input,button{width:100%;box-sizing:border-box;padding:14px;margin:8px 0;border-radius:12px;border:0;font-size:16px}button{background:#2f7df6;color:white}.secondary{background:#333}button:disabled{opacity:.45}pre{white-space:pre-wrap;background:#000;padding:14px;border-radius:12px}.pill{display:inline-block;padding:8px 12px;border-radius:999px;background:#166534}.error{background:#7f1d1d}.rooms,.devices{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}.room,.device{background:#262629;border-radius:14px;padding:12px;transition:opacity .15s,background .15s,box-shadow .15s}.device.active,.room.active{background:#292c2a;box-shadow:inset 0 0 0 1px rgba(34,197,94,.35)}.device.inactive,.room.inactive{opacity:.68}.device.inactive .row button{background:#303033;color:#aaa}.row{display:flex;gap:8px}.row button{padding:10px;margin:8px 0}.row button.selected{background:#15803d;color:#fff;box-shadow:inset 0 0 0 1px rgba(134,239,172,.35)}.row button.idle{background:#303033;color:#aaa}.state,.attr{display:inline-block;color:#fff;font-size:13px;border-radius:999px;padding:3px 8px;margin-top:6px}.state.on{background:#166534}.state.off{background:#555}.state.unknown{background:#7f1d1d}.attrs{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;min-height:24px}.attr{background:#3a3a3d}.muted{color:#b9b9bd;font-size:14px}
  </style>
</head>
<body>
<div class="wrap">
  <h1>🏠 HomeBrain OS <small>v0.7.13</small></h1>
  <div class="card"><span class="pill" id="status">Checking...</span></div>
  <div class="card grid">
    <div class="metric summary-tile" role="button" tabindex="0" data-summary-query="which lights are on"><div class="big" id="lights">0</div><div>Lights on</div></div>
    <div class="metric summary-tile" role="button" tabindex="0" data-summary-query="home temperature"><div class="big" id="temp">—°</div><div>Avg temp</div></div>
    <div class="metric summary-tile" role="button" tabindex="0" data-summary-query="home humidity"><div class="big" id="hum">—%</div><div>Avg humidity</div></div>
    <div class="metric summary-tile" role="button" tabindex="0" data-summary-query="explain power tile"><div class="big" id="power">0W</div><div>Whole-house power</div><div class="mini"><a href="#" id="powerSource">Octopus meter</a></div></div>
    <div class="metric summary-tile" role="button" tabindex="0" data-summary-query="which switches are on"><div class="big" id="switches">0</div><div>Switches on</div></div>
    <div class="metric summary-tile" role="button" tabindex="0" data-summary-query="who is home"><div class="big" id="people">0/4</div><div>People home</div><div class="mini" id="peopleNames">No one home</div></div>
    <div class="metric summary-tile" role="button" tabindex="0" data-summary-query="which batteries are low"><div class="big" id="batt">0</div><div>Low batteries</div></div>
    <div class="metric summary-tile" role="button" tabindex="0" data-summary-query="which motion sensors are active"><div class="big" id="motion">0</div><div>Motion active</div></div>
  </div>
  <div class="card">
    <input id="q" placeholder="Ask HomeBrain...">
    <button onclick="ask()">Ask</button>
    <button onclick="voice()">🎤 Speak</button>
  </div>
  <div class="card grid">
    <button class="secondary" onclick="quick('summary')">Summary</button>
    <button class="secondary" onclick="quick('diagnostics')">Diagnostics</button>
    <button class="secondary" onclick="quick('refresh cache')">Refresh cache</button>
    <button class="secondary" onclick="clearRefresh()">Clear cache</button>
    <button class="secondary" onclick="quick('hallway humidity')">Hallway humidity</button>
    <button class="secondary" onclick="quick('hallway temperature')">Hallway temperature</button>
    <button class="secondary" onclick="quick('which lights are on')">Which lights are on?</button>
    <button class="secondary" onclick="quick('which switches are on')">Which switches are on?</button>
  </div>
  <div class="card"><h2>Controllable Devices</h2><div class="devices" id="devices">Loading devices...</div></div>
  <div class="card"><h2>Rooms</h2><div class="rooms" id="rooms">Loading rooms...</div></div>
  <pre id="out">Ready</pre>
</div>
<script>
const $ = id => document.getElementById(id);
let apiToken = localStorage.getItem('homebrainos_api_token') || '';
async function api(path, options={}){
  const headers = Object.assign({}, options.headers || {});
  if(apiToken) headers['X-HomeBrain-Token'] = apiToken;
  if(options.body && !headers['Content-Type']) headers['Content-Type'] = 'application/json';
  const response = await fetch(path, Object.assign({}, options, {headers}));
  if(response.status === 401){
    const token = prompt('HomeBrain API token');
    if(token){
      apiToken = token;
      localStorage.setItem('homebrainos_api_token', token);
      return api(path, options);
    }
  }
  if(!response.ok) throw new Error(`${response.status} ${response.statusText}`);
  return response.json();
}
async function postApi(path, body){
  return api(path, {method:'POST', body: body === undefined ? undefined : JSON.stringify(body)});
}
function escapeHtml(value){
  return String(value).replace(/[&<>"']/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));
}
function roomCard(room){
  const active=(room.lights_on||0)+(room.switches_on||0)+(room.motion_active||0)>0;
  return `<div class="room ${active?'active':'inactive'}"><b>${escapeHtml(room.room)}</b><br>${room.devices} devices<br>💡 ${room.lights_on} on · ⏻ ${room.switches_on||0} on<br>🌡 ${room.avg_temperature??'—'}° 💧 ${room.avg_humidity??'—'}%<br>⚡ ${room.power_total||0}W · 🏃 ${room.motion_active||0} · 🔋 ${room.low_batteries||0}</div>`;
}
function formatAttr(key, value){
  const labels={level:'Level',temperature:'Temp',humidity:'Humidity',illuminance:'Lux',power:'Power',energy:'Energy',battery:'Battery',motion:'Motion',contact:'Contact',presence:'Presence',lock:'Lock',water:'Water',smoke:'Smoke',carbonMonoxide:'CO',tamper:'Tamper',acceleration:'Accel',valve:'Valve',windowShade:'Shade',thermostatMode:'Mode',thermostatOperatingState:'Operating',heatingSetpoint:'Heat set',coolingSetpoint:'Cool set'};
  const units={level:'%',temperature:'°',humidity:'%',illuminance:' lx',power:'W',energy:' kWh',battery:'%',heatingSetpoint:'°',coolingSetpoint:'°'};
  return `${labels[key]||key}: ${escapeHtml(value)}${units[key]||''}`;
}
function attrChips(device){
  const attrs=device.attributes||{};
  const byCategory={
    light:['switch','level','power','energy'],
    switch:['switch','power','energy'],
    power_device:['switch','power','energy'],
    thermostat:['temperature','heatingSetpoint','thermostatMode','thermostatOperatingState','battery'],
    climate_sensor:['temperature','humidity','battery'],
    light_sensor:['illuminance','battery'],
    motion_sensor:['motion','battery'],
    contact_sensor:['contact','battery'],
    presence_sensor:['presence','battery']
  };
  const primary=byCategory[device.category]||['switch','temperature','humidity','power','battery'];
  const chips=[];
  for(const key of primary){
    const value=device[key]??attrs[key];
    if(value!==undefined && value!==null && value!=='') chips.push(`<span class="attr">${formatAttr(key,value)}</span>`);
    if(chips.length>=4) break;
  }
  return chips.length?`<div class="attrs">${chips.join('')}</div>`:'';
}
function isThermostat(device){
  return device.category==='thermostat' || String(device.label||'').toLowerCase().includes('trv');
}
function controls(device, rawState){
  const id=escapeHtml(device.id);
  if(isThermostat(device)){
    const setpoint=device.heatingSetpoint??(device.attributes||{}).heatingSetpoint??'—';
    const heating=String(device.thermostatOperatingState||'').toLowerCase().includes('heat');
    return `<div class="row"><button class="secondary ${heating?'idle':'selected'}" data-action="setpoint" data-device-id="${id}" data-delta="-1">-</button><button disabled class="${heating?'selected':'idle'}">${escapeHtml(setpoint)}°</button><button class="${heating?'selected':'idle'}" data-action="setpoint" data-device-id="${id}" data-delta="1">+</button></div>`;
  }
  return `<div class="row"><button class="${rawState==='on'?'selected':'idle'}" data-action="command" data-device-id="${id}" data-command="on" ${rawState==='on'?'disabled':''}>On</button><button class="${rawState==='off'?'selected':'idle'}" data-action="command" data-device-id="${id}" data-command="off" ${rawState==='off'?'disabled':''}>Off</button></div>`;
}
function deviceCard(device){
  const rawState = String(device.switch??'unknown').toLowerCase();
  const stateClass = rawState==='on'?'on':rawState==='off'?'off':'unknown';
  const badge=isThermostat(device)?'climate':rawState;
  const badgeClass=isThermostat(device)?'off':stateClass;
  const active=isThermostat(device)?String(device.thermostatOperatingState||'').toLowerCase().includes('heat'):rawState==='on';
  return `<div class="device ${active?'active':'inactive'}"><b>${escapeHtml(device.label)}</b><br><span class="state ${badgeClass}">${escapeHtml(badge)}</span> <span class="muted">${escapeHtml(device.category||'device')} · ${escapeHtml(device.room||'Unknown')}</span>${attrChips(device)}${controls(device,rawState)}</div>`;
}
$('devices').addEventListener('click', event => {
  const button = event.target.closest('button[data-action]');
  if(!button) return;
  if(button.dataset.action === 'command') deviceCommand(button.dataset.deviceId, button.dataset.command);
  if(button.dataset.action === 'setpoint') setpoint(button.dataset.deviceId, Number(button.dataset.delta));
});
$('powerSource').addEventListener('click', event => {
  event.preventDefault();
  quick('explain power tile');
});
document.querySelectorAll('.summary-tile').forEach(tile => {
  const run = () => quick(tile.dataset.summaryQuery || 'explain summary tiles');
  tile.addEventListener('click', event => {
    if(event.target.tagName === 'A') return;
    run();
  });
  tile.addEventListener('keydown', event => {
    if(event.key === 'Enter' || event.key === ' '){
      event.preventDefault();
      run();
    }
  });
});
async function status(){
  const badge=$('status');
  try{
    const s=await api('/api/status');
    badge.textContent=s.error?'Hubitat error: '+s.error:'Online · '+s.devices+' devices · SQLite cache';
    badge.className=s.error?'pill error':'pill';
    const d=await api('/api/dashboard');
    $('lights').textContent=d.lights_on; $('switches').textContent=d.switches_on; $('batt').textContent=d.low_batteries;
    $('people').textContent=(d.people_home??0)+'/'+(d.people_tracked??4); $('motion').textContent=d.motion_active;
    $('peopleNames').textContent=(d.people_home_names||[]).join(', ') || 'No one home';
    $('powerSource').textContent=d.power_source_label||'Octopus meter';
    $('temp').textContent=(d.avg_temperature??'—')+'°'; $('hum').textContent=(d.avg_humidity??'—')+'%'; $('power').textContent=d.power_display||(d.power_total+'W');
    loadRooms();
    loadDevices();
  }catch(err){
    badge.textContent='API offline: '+err.message;
    badge.className='pill error';
  }
}
async function loadDevices(){
  try{
    const r=await api('/api/switches');
    $('devices').innerHTML=(r.devices||[]).slice(0,24).map(deviceCard).join('') || 'No switchable devices found';
  }catch(err){
    $('devices').textContent='Devices unavailable';
  }
}
async function deviceCommand(id, command){
  try{
    const j=await postApi('/api/device/'+encodeURIComponent(id)+'/command/'+encodeURIComponent(command));
    $('out').textContent=j.message||JSON.stringify(j,null,2);
    if(j.devices) $('devices').innerHTML=j.devices.slice(0,24).map(deviceCard).join('');
    status();
  }catch(err){
    $('out').textContent='Command failed: '+err.message;
  }
}
async function setpoint(id, delta){
  try{
    const j=await postApi('/api/device/'+encodeURIComponent(id)+'/setpoint/'+encodeURIComponent(delta));
    $('out').textContent=j.message||JSON.stringify(j,null,2);
    status();
  }catch(err){
    $('out').textContent='Setpoint failed: '+err.message;
  }
}
async function clearRefresh(){
  try{
    const j=await postApi('/api/cache/clear-refresh');
    $('out').textContent=j.success?'Cache cleared and refreshed: '+j.devices+' devices':'Refresh failed: '+j.error;
    status();
  }catch(err){
    $('out').textContent='Clear refresh failed: '+err.message;
  }
}
async function loadRooms(){
  try{
    const r=await api('/api/rooms');
    $('rooms').innerHTML=(r.rooms||[]).filter(x=>x.room!=='Unknown').slice(0,12).map(roomCard).join('') || 'No rooms found';
  }catch(err){
    $('rooms').textContent='Rooms unavailable';
  }
}
async function ask(){
  const text=$('q').value.trim(); if(!text) return;
  try{
    const j=await postApi('/api/assistant', {q:text});
    $('out').textContent=j.message||JSON.stringify(j,null,2);
    speak(j.message||'Done');
    status();
  }catch(err){
    $('out').textContent='Request failed: '+err.message;
  }
}
function quick(t){$('q').value=t;ask()}
function speak(t){ if('speechSynthesis' in window && t) speechSynthesis.speak(new SpeechSynthesisUtterance(t)); }
function voice(){ const SR=window.SpeechRecognition||window.webkitSpeechRecognition; if(!SR){alert('Voice not supported');return;} const r=new SR(); r.lang='en-GB'; r.onresult=e=>{$('q').value=e.results[0][0].transcript;ask()}; r.start(); }
status(); setInterval(status,30000);
</script>
</body>
</html>
